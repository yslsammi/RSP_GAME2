<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>視覺搜尋 - 眼神偵測修復版</title>
    <script src="https://webgazer.cs.brown.edu/webgazer.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: white; overflow: hidden; }
        #game-object {
            position: absolute; width: 200px; display: none; z-index: 5;
            transition: transform 0.1s; cursor: pointer;
        }
        #setup-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        button { padding: 20px 40px; font-size: 24px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>👁️ 眼動功能修復測試</h1>
        <p>點擊下方按鈕後，請觀察是否有「小綠點」或「小紅點」出現。</p>
        <button id="start-btn">1. 開啟鏡頭並顯示偵測點</button>
        <button id="play-btn" style="margin-top:20px; background:#007bff; display:none;">2. 看到點了，開始遊戲</button>
    </div>

    <img id="game-object" src="banana.jpg">

    <script>
        const gameObj = document.getElementById('game-object');
        const startBtn = document.getElementById('start-btn');
        const playBtn = document.getElementById('play-btn');
        const setupScreen = document.getElementById('setup-screen');

        function moveBanana() {
            gameObj.style.left = Math.random() * (window.innerWidth - 200) + 'px';
            gameObj.style.top = Math.random() * (window.innerHeight - 200) + 'px';
            gameObj.style.display = 'block';
        }

        startBtn.onclick = function() {
            startBtn.innerText = "正在啟動...";
            
            // 強制開啟 WebGazer 原生紅點
            webgazer.setGazeListener((data, elapsed) => {
                if (data == null) return;

                // 眼神碰撞偵測
                const rect = gameObj.getBoundingClientRect();
                if (data.x >= rect.left && data.x <= rect.right && data.y >= rect.top && data.y <= rect.bottom) {
                    gameObj.style.display = 'none';
                    setTimeout(moveBanana, 500);
                }
            }).begin();

            // 關鍵：強制顯示原生的預測點 (通常是綠色或紅色小點)
            webgazer.showPredictionPoints(true); 
            webgazer.showVideoPreview(true);

            startBtn.style.display = 'none';
            playBtn.style.display = 'block';
        };

        playBtn.onclick = function() {
            setupScreen.style.display = 'none';
            moveBanana();
        };

        // 防止網頁自動進入睡眠
        window.onbeforeunload = function() {
            webgazer.end();
        };
    </script>
</body>
</html>
</html>
