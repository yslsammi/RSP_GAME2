<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>視覺搜尋遊戲 - 香港版</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: "Arial", "Microsoft JhengHei", sans-serif;
            background-color: #000;
            -webkit-user-select: none;
            user-select: none;
        }

        /* --- 遊戲層 --- */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s;
        }

        #dim-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            opacity: 0;
            pointer-events: none;
            z-index: 1;
        }

        #game-object {
            position: absolute;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.1s;
            display: none; 
            object-fit: contain;
            /* 針對實景背景增加更強的發光和陰影回饋 */
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.9)); 
        }

        #game-object:active {
            transform: scale(0.9);
        }

        /* --- 勝利畫面 --- */
        #win-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        #win-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        #win-image-container {
            position: relative;
            width: 80vmin;
            height: 80vmin;
        }

        #win-image-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* --- 設定按鈕 --- */
        #settings-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 60px;
            height: 60px;
            background-color: #fff;
            border-radius: 15px;
            border: 4px solid #333;
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 999;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        /* --- 設定面板 --- */
        #settings-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #fff;
            z-index: 1001;
            padding: 20px;
            box-sizing: border-box;
            display: none;
            overflow-y: auto;
        }

        .panel-content {
            max-width: 800px;
            margin: 0 auto;
            padding-bottom: 50px;
        }

        h2 {
            text-align: center;
            color: #000;
            font-size: 2.5rem;
            margin-bottom: 30px;
            border-bottom: 5px solid #000;
            padding-bottom: 10px;
        }

        .setting-group {
            margin-bottom: 40px;
            background: #f0f0f0;
            padding: 20px;
            border-radius: 20px;
        }

        .setting-label {
            font-weight: bold;
            font-size: 1.8rem;
            display: block;
            margin-bottom: 15px;
            color: #000;
        }

        /* 模式按鈕 */
        .mode-options {
            display: flex;
            gap: 20px;
        }
        
        .mode-options input[type="radio"] {
            display: none;
        }

        .mode-btn {
            flex: 1;
            padding: 20px;
            background: white;
            border: 4px solid #ccc;
            border-radius: 15px;
            font-size: 1.5rem;
            text-align: center;
            cursor: pointer;
            color: #555;
            font-weight: bold;
        }

        .mode-options input[type="radio"]:checked + .mode-btn {
            border-color: #0056b3;
            background-color: #dbeaff;
            color: #000;
            box-shadow: 0 0 15px rgba(0, 86, 179, 0.4);
        }

        /* 背景圖片 */
        .bg-options {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .bg-option {
            width: 160px;
            height: 120px;
            border: 5px solid #ccc;
            cursor: pointer;
            object-fit: cover;
            border-radius: 15px;
            transition: 0.2s;
        }

        .bg-option.selected {
            border-color: #e60000;
            box-shadow: 0 0 15px rgba(230, 0, 0, 0.5);
            transform: scale(1.05);
        }

        /* 目標物件 */
        .obj-options {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .obj-btn {
            flex: 1;
            min-width: 140px;
            padding: 20px;
            background: white;
            border: 4px solid #ccc;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
        }

        .obj-btn.selected {
            background: #0056b3;
            color: white;
            border-color: #003d80;
        }

        /* 滑桿 */
        .slider-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 30px;
            background: #ddd;
            border-radius: 15px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #0056b3;
            border: 4px solid white;
            cursor: pointer;
        }

        #dim-value {
            font-size: 2rem;
            font-weight: bold;
            min-width: 100px;
            text-align: right;
        }

        /* 大小按鈕 */
        .size-options {
            display: flex;
            gap: 15px;
        }

        .size-btn {
            flex: 1;
            padding: 25px 0;
            border: 4px solid #ccc;
            background: white;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .size-btn.selected {
            background: #0056b3;
            color: white;
            border-color: #003d80;
        }

        /* 關閉按鈕 */
        #close-settings {
            display: block;
            width: 100%;
            padding: 25px;
            background-color: #28a745;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 40px;
            box-shadow: 0 6px 0 #1e7e34;
        }

        #close-settings:active {
            box-shadow: 0 2px 0 #1e7e34;
            transform: translateY(4px);
        }

    </style>
</head>
<body>

    <audio id="success-sound" src="cheer.mp3"></audio>

    <div id="game-container">
        <div id="dim-overlay"></div>
        <img id="game-object" src="" alt="目標物">
        <div id="settings-btn" role="button" aria-label="設定">⚙️</div>
    </div>

    <div id="win-overlay">
        <div id="win-image-container">
            <img id="win-image-back" src="" alt="">
        </div>
    </div>

    <div id="settings-panel">
        <div class="panel-content">
            <h2>⚙️ 遊戲設定</h2>
            
            <div class="setting-group">
                <span class="setting-label">1. 遊戲模式</span>
                <div class="mode-options">
                    <label style="flex:1; cursor:pointer;">
                        <input type="radio" name="mode" value="1" checked>
                        <div class="mode-btn">找原圖</div>
                    </label>
                    <label style="flex:1; cursor:pointer;">
                        <input type="radio" name="mode" value="2">
                        <div class="mode-btn">找半隱藏</div>
                    </label>
                </div>
            </div>

            <div class="setting-group">
                <span class="setting-label">2. 選擇背景圖片</span>
                <div class="bg-options">
                    <img src="HK.jpg" class="bg-option selected" data-bg="HK.jpg" alt="香港街景">
                    <img src="MTR2.jpg" class="bg-option" data-bg="MTR2.jpg" alt="港鐵月台">
                    <img src="supermarket.jpg" class="bg-option" data-bg="supermarket.jpg" alt="超市">
                </div>
            </div>

            <div class="setting-group">
                <span class="setting-label">3. 選擇目標物</span>
                <div class="obj-options">
                    <button class="obj-btn" data-obj="apple.jpg">🍎 蘋果</button>
                    <button class="obj-btn selected" data-obj="banana.jpg">🍌 香蕉</button>
                    <button class="obj-btn" data-obj="MTR.jpg">🚇 港鐵</button>
                    <button class="obj-btn" data-obj="taxi.png">🚕 的士</button>
                    <button class="obj-btn" data-obj="minibus.png">🚌 小巴</button>
                </div>
            </div>

            <div class="setting-group">
                <span class="setting-label">4. 背景變暗程度</span>
                <div class="slider-container">
                    <input type="range" id="dim-slider" min="0" max="100" value="0">
                    <span id="dim-value">0%</span>
                </div>
            </div>

            <div class="setting-group">
                <span class="setting-label">5. 目標物件大小</span>
                <div class="size-options">
                    <button class="size-btn" data-size="small">小</button>
                    <button class="size-btn selected" data-size="medium">中</button>
                    <button class="size-btn" data-size="large">大</button>
                </div>
            </div>

            <button id="close-settings">✅ 完成，開始遊戲</button>
        </div>
    </div>

    <script>
        const gameState = {
            mode: '1', 
            background: 'HK.jpg',
            object: 'apple.jpg', // 預設目標物
            dimLevel: 0,
            size: 'medium'
        };

        const sizes = {
            small: 115,
            medium: 190,
            large: 300
        };

        const gameContainer = document.getElementById('game-container');
        const gameObject = document.getElementById('game-object');
        const dimOverlay = document.getElementById('dim-overlay');
        const settingsBtn = document.getElementById('settings-btn');
        const settingsPanel = document.getElementById('settings-panel');
        const closeSettingsBtn = document.getElementById('close-settings');
        const winOverlay = document.getElementById('win-overlay');
        const winImgBack = document.getElementById('win-image-back');
        const audio = document.getElementById('success-sound');
        const dimSlider = document.getElementById('dim-slider');
        const dimValueText = document.getElementById('dim-value');

        function init() {
            applySettings();
            spawnObject();
        }

        function spawnObject() {
            const sizePx = sizes[gameState.size];
            
            // 設定所選目標物的圖片路徑
            gameObject.src = gameState.object;
            
            gameObject.style.width = sizePx + 'px';
            gameObject.style.height = 'auto'; 
            gameObject.style.display = 'block';

            // 半隱藏模式設定：降低透明度
            if (gameState.mode === '2') {
                gameObject.style.opacity = '0.4';
                gameObject.style.filter = 'drop-shadow(0 0 5px rgba(255,255,255,0.5))'; // 減弱發光
            } else {
                gameObject.style.opacity = '1';
                gameObject.style.filter = 'drop-shadow(0 0 10px rgba(255,255,255,0.9))'; // 加強發光
            }

            const maxX = window.innerWidth - sizePx;
            const maxY = window.innerHeight - sizePx;

            let randomX = Math.random() * maxX;
            let randomY = Math.random() * maxY;

            // 避開左上角按鈕
            if (randomX < 120 && randomY < 120) {
                randomX += 140;
                randomY += 140;
            }

            gameObject.style.left = randomX + 'px';
            gameObject.style.top = randomY + 'px';
        }

        gameObject.addEventListener('click', function() {
            // 點擊回饋：瞬間發光與放大
            this.style.filter = "brightness(2) contrast(1.5) drop-shadow(0 0 20px white)";
            this.style.transform = "scale(1.2)";
            setTimeout(() => { playWinSequence(); }, 100);
        });

        function playWinSequence() {
            // 語音回饋 (如果支援)
            if ('speechSynthesis' in window) {
                const synth = window.speechSynthesis;
                synth.cancel(); // 停止之前的語音
                const objName = document.querySelector(`.obj-btn[data-obj="${gameState.object}"]`).textContent;
                const utter = new SpeechSynthesisUtterance(`找到了${objName}`);
                utter.lang = 'zh-HK';
                utter.rate = 1.0;
                utter.pitch = 1.0;
                utter.volume = 1.0;
                // synth.speak(utter); // 視需求開啟語音提示
            }

            // 音效回饋
            try { 
                audio.currentTime = 0;
                audio.play(); 
            } catch(e) { console.log("音效播放失敗", e); }

            // 設定勝利畫面的目標物圖片
            winImgBack.src = gameState.object;

            winOverlay.classList.add('active');

            // 復原遊戲物件樣式
            gameObject.style.transform = "scale(1)";

            // 3秒後自動重置
            setTimeout(() => { resetGame(); }, 3000); 
        }

        function resetGame() {
            winOverlay.classList.remove('active');
            spawnObject(); 
        }

        // --- 設定面板邏輯 ---

        settingsBtn.addEventListener('click', () => {
            settingsPanel.style.display = 'block';
        });

        closeSettingsBtn.addEventListener('click', () => {
            settingsPanel.style.display = 'none';
            spawnObject(); // 完成設定後重新放置物件
        });

        // 監聽模式選擇
        document.querySelectorAll('input[name="mode"]').forEach(radio => {
            radio.addEventListener('change', (e) => { gameState.mode = e.target.value; });
        });

        // 監聽背景選擇
        document.querySelectorAll('.bg-option').forEach(img => {
            img.addEventListener('click', (e) => {
                document.querySelectorAll('.bg-option').forEach(i => i.classList.remove('selected'));
                e.target.classList.add('selected');
                gameState.background = e.target.getAttribute('data-bg');
                applySettings();
            });
        });

        // 監聽目標物選擇 (新加入)
        document.querySelectorAll('.obj-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.obj-btn').forEach(b => b.classList.remove('selected'));
                e.target.classList.add('selected');
                gameState.object = e.target.getAttribute('data-obj');
            });
        });

        // 監聽背景變暗滑桿
        dimSlider.addEventListener('input', (e) => {
            gameState.dimLevel = e.target.value;
            dimValueText.textContent = gameState.dimLevel + '%';
            applySettings();
        });

        // 監聽物件大小選擇
        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
                e.target.classList.add('selected');
                gameState.size = e.target.getAttribute('data-size');
            });
        });

        function applySettings() {
            gameContainer.style.backgroundImage = `url('${gameState.background}')`;
            dimOverlay.style.opacity = gameState.dimLevel / 100;
        }

        // 監聽視窗大小變化，重新放置物件
        window.addEventListener('resize', () => {
            if (settingsPanel.style.display !== 'block') {
                spawnObject();
            }
        });

        // 初始化遊戲
        init();

    </script>
</body>
</html>
