<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>視覺搜尋遊戲 - 紅點修正版</title>
    <script src="https://webgazer.cs.brown.edu/webgazer.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; background-size: cover; background-position: center; }
        #game-object { position: absolute; cursor: pointer; display: none; object-fit: contain; z-index: 10; filter: drop-shadow(0 0 10px white); }
        #settings-btn { position: absolute; top: 20px; left: 20px; width: 60px; height: 60px; background: white; border-radius: 15px; font-size: 30px; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 999; }
        #settings-panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 1001; padding: 20px; box-sizing: border-box; display: none; overflow-y: auto; }
        .setting-group { margin-bottom: 20px; background: #f0f0f0; padding: 15px; border-radius: 15px; }
        .obj-btn { padding: 15px; background: white; border: 2px solid #ccc; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        
        /* 強制顯示紅點 */
        #eye-cursor { 
            position: fixed; 
            width: 30px; 
            height: 30px; 
            background: rgba(255, 0, 0, 0.8); 
            border: 2px solid white;
            border-radius: 50%; 
            pointer-events: none; 
            z-index: 99999; /* 確保在最上層 */
            display: none; 
            box-shadow: 0 0 15px rgba(255, 0, 0, 1);
            transform: translate(-50%, -50%); /* 讓中心點對準座標 */
        }
    </style>
</head>
<body>
    <audio id="success-sound" src="cheer.mp3"></audio>
    <div id="eye-cursor"></div>
    <div id="game-container">
        <img id="game-object" src="">
        <div id="settings-btn">⚙️</div>
    </div>

    <div id="settings-panel">
        <h2>⚙️ 眼動校準與設定</h2>
        <div class="setting-group">
            <button id="toggle-eye" class="obj-btn" style="background: #ffeb3b;">🚀 啟動眼動儀 (顯示紅點)</button>
            <p id="status-msg" style="color: green; font-weight: bold; margin-top: 10px;"></p>
        </div>
        <button id="close-settings" class="obj-btn" style="background: #4caf50; color: white;">✅ 開始遊戲</button>
    </div>

    <script>
        const state = { obj: 'banana.jpg', eyeEnabled: false };
        const gameObj = document.getElementById('game-object');
        const statusMsg = document.getElementById('status-msg');
        const eyeCursor = document.getElementById('eye-cursor');

        function spawn() {
            gameObj.src = state.obj;
            gameObj.style.width = '200px';
            gameObj.style.left = '50%';
            gameObj.style.top = '50%';
            gameObj.style.display = 'block';
        }

        document.getElementById('toggle-eye').onclick = async function() {
            try {
                webgazer.setGazeListener((data, elapsed) => {
                    if (data) {
                        eyeCursor.style.display = 'block';
                        eyeCursor.style.left = data.x + 'px';
                        eyeCursor.style.top = data.y + 'px';

                        // 自動觸發檢測
                        const rect = gameObj.getBoundingClientRect();
                        if (data.x >= rect.left && data.x <= rect.right &&
                            data.y >= rect.top && data.y <= rect.bottom) {
                            if (gameObj.style.display !== 'none') {
                                document.getElementById('success-sound').play();
                                gameObj.style.display = 'none';
                                setTimeout(spawn, 500);
                            }
                        }
                    }
                }).begin();

                webgazer.showVideoPreview(true).showPredictionPoints(true);
                statusMsg.innerText = "✅ 運行中！請盯着紅點並用滑鼠點擊它進行校準。";
            } catch (err) {
                alert("啟動失敗: " + err);
            }
        };

        document.getElementById('settings-btn').onclick = () => document.getElementById('settings-panel').style.display = 'block';
        document.getElementById('close-settings').onclick = () => {
            document.getElementById('settings-panel').style.display = 'none';
            spawn();
        };

        spawn();
    </script>
</body>
</html>
