<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>視覺搜尋遊戲 - 穩定分類版</title>
    <style>
        :root { --primary: #007AFF; --success: #28a745; --gaze: #ffeb3b; }
        * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* 場景層 */
        #scene { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        #bg { position: absolute; inset: 0; background-size: cover; background-position: center; transition: filter 0.3s; z-index: 1; }

        /* 目標容器：15px藍框 + 高對比 */
        #obj-wrap {
            position: absolute; display: none; z-index: 10;
            background: #fff; border: 15px solid var(--primary); border-radius: 30px;
            box-shadow: 0 0 50px #fff, 0 0 20px rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
        }
        #target-img { display: block; width: 100%; height: auto; object-fit: contain; }

        /* 進度條 */
        #progress {
            position: absolute; bottom: -22px; left: 5px; right: 5px; height: 16px;
            background: var(--gaze); border-radius: 10px; width: 0%; z-index: 20;
        }

        /* 按鈕與面板 */
        #set-btn { position: absolute; top: 20px; left: 20px; width: 60px; height: 60px; background: rgba(255,255,255,0.4); border: 2px solid #fff; border-radius: 15px; font-size: 30px; display: flex; justify-content: center; align-items: center; z-index: 999; cursor: pointer; }
        #panel { position: fixed; inset: 0; background: #1a1a1a; z-index: 1001; padding: 30px; color: #fff; display: none; overflow-y: auto; }
        .item { margin-bottom: 20px; background: #2a2a2a; padding: 15px; border-radius: 15px; }
        .label { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; display: block; color: #ccc; }
        .opts { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        
        /* 選項樣式 */
        .btn { padding: 12px 18px; background: #444; border: 3px solid #555; border-radius: 10px; color: #fff; cursor: pointer; }
        .btn.selected { background: var(--primary); border-color: #fff; }
        .bg-btn { width: 100px; height: 60px; border: 3px solid #555; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        #close-btn { width: 100%; padding: 20px; background: var(--success); color: #fff; border: none; border-radius: 15px; font-size: 1.5rem; font-weight: bold; margin-top: 20px; }
        #next-btn { display: none; position: fixed; bottom: 10%; left: 50%; transform: translateX(-50%); padding: 20px 60px; background: var(--success); color: #fff; border: 3px solid #fff; border-radius: 50px; font-size: 2rem; z-index: 2000; }

        /* 答對動畫 */
        .win { left: 50% !important; top: 50% !important; transform: translate(-50%, -50%) scale(1.5) !important; border-color: var(--success) !important; }
    </style>
</head>
<body>

<div id="scene">
    <div id="bg"></div>
    <div id="obj-wrap">
        <img id="target-img" src="">
        <div id="progress"></div>
    </div>
    <div id="set-btn">⚙️</div>
</div>

<div id="panel">
    <h2 style="text-align:center">遊戲訓練設定</h2>
    
    <div class="item">
        <span class="label">1. 背景選擇</span>
        <div class="opts">
            <div class="bg-btn selected" data-type="img" data-val="mtr">地鐵</div>
            <div class="bg-btn" data-type="img" data-val="street">街道</div>
            <div class="bg-btn" data-type="color" data-val="white" style="background:#fff;color:#000">純白</div>
            <div class="bg-btn" data-type="color" data-val="black" style="background:#000;color:#fff">純黑</div>
        </div>
    </div>

    <div class="item" id="blur-ctrl">
        <span class="label">2. 背景模糊度</span>
        <input type="range" id="blur-range" min="0" max="20" value="0" style="width:100%">
    </div>

    <div class="item">
        <span class="label">3. 訓練類別</span>
        <div class="opts">
            <button class="btn cat-btn selected" data-cat="hk">香港交通</button>
            <button class="btn cat-btn" data-cat="fruit">水果類</button>
        </div>
    </div>

    <div class="item">
        <span class="label">4. 具體目標</span>
        <div class="opts" id="obj-list"></div>
    </div>

    <div class="item">
        <span class="label">5. 目標大小</span>
        <div class="opts">
            <button class="btn size-btn" data-size="400">大</button>
            <button class="btn size-btn selected" data-size="250">中</button>
            <button class="btn size-btn" data-size="130">小</button>
        </div>
    </div>

    <button id="close-btn">確定開始</button>
</div>

<button id="next-btn">下一題 ➔</button>
