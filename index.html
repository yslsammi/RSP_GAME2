<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>視覺搜尋遊戲 - 紅點強化版</title>
    <script src="https://webgazer.cs.brown.edu/webgazer.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #game-container { position: relative; width: 100vw; height: 100vh; background-color: #000; }
        #game-object { position: absolute; cursor: pointer; display: none; object-fit: contain; z-index: 10; filter: drop-shadow(0 0 10px white); }
        #settings-btn { position: absolute; top: 20px; left: 20px; width: 60px; height: 60px; background: white; border-radius: 15px; font-size: 30px; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 999; }
        #settings-panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 1001; padding: 20px; box-sizing: border-box; display: none; overflow-y: auto; }
        
        /* 這裡是關鍵：強制顯示的巨大紅點 */
        #eye-dot {
            position: fixed;
            width: 40px;
            height: 40px;
            background: rgba(255, 0, 0, 0.7);
            border: 3px solid #fff;
            border-radius: 50%;
            pointer-events: none; /* 讓紅點不影響點擊 */
            z-index: 999999;
            display: none;
            box-shadow: 0 0 20px red;
            transform: translate(-50%, -50%);
        }
        .obj-btn { padding: 15px; background: #eee; border: 1px solid #ccc; border-radius: 10px; cursor: pointer; width: 100%; margin-bottom: 10px; font-size: 1.2rem; }
    </style>
</head>
<body>
    <audio id="success-sound" src="cheer.mp3"></audio>
    <div id="eye-dot"></div>
    
    <div id="game-container">
        <img id="game-object" src="">
        <div id="settings-btn">⚙️</div>
    </div>

    <div id="settings-panel">
        <h2>👁️ 眼動追蹤校準</h2>
        <div style="background: #fff3cd; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
            <button id="start-eye" class="obj-btn" style="background: #ffc107;">1. 點我啟動並顯示紅點</button>
            <p>啟動後，請盯着紅點，並**用滑鼠去點擊紅點**幾次進行校準。</p>
        </div>
        <button id="close-settings" class="obj-btn" style="background: #28a745; color: white;">2. 完成校準，開始遊戲</button>
    </div>

    <script>
        const dot = document.getElementById('eye-dot');
        const gameObj = document.getElementById('game-object');

        function spawn() {
            gameObj.src = 'banana.jpg';
            gameObj.style.width = '250px';
            gameObj.style.left = Math.random() * (window.innerWidth - 250) + 'px';
            gameObj.style.top = Math.random() * (window.innerHeight - 250) + 'px';
            gameObj.style.display = 'block';
        }

        document.getElementById('start-eye').onclick = function() {
            webgazer.setGazeListener((data, elapsed) => {
                if (data) {
                    // 更新自定義紅點位置
                    dot.style.display = 'block';
                    dot.style.left = data.x + 'px';
                    dot.style.top = data.y + 'px';

                    // 檢查是否注視到香蕉
                    const rect = gameObj.getBoundingClientRect();
                    if (data.x >= rect.left && data.x <= rect.right &&
                        data.y >= rect.top && data.y <= rect.bottom) {
                        if(gameObj.style.display !== 'none') {
                            document.getElementById('success-sound').play();
                            gameObj.style.display = 'none';
                            setTimeout(spawn, 500);
                        }
                    }
                }
            }).begin();
            webgazer.showVideoPreview(true).showPredictionPoints(false); // 關閉官方小點，用我們的大紅點
        };

        document.getElementById('settings-btn').onclick = () => document.getElementById('settings-panel').style.display = 'block';
        document.getElementById('close-settings').onclick = () => {
            document.getElementById('settings-panel').style.display = 'none';
            spawn();
        };

        spawn();
    </script>
</body>
</html>
