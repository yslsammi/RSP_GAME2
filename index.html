<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>視覺搜尋遊戲 - 穩定分類版</title>
    <style>
        :root { --primary: #007AFF; --success: #28a745; --gaze: #ffeb3b; }
        * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* 場景層 */
        #scene { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        #bg { position: absolute; inset: 0; background-size: cover; background-position: center; transition: filter 0.3s; z-index: 1; }

        /* 目標容器：15px藍框 + 高對比 */
        #obj-wrap {
            position: absolute; display: none; z-index: 10;
            background: #fff; border: 15px solid var(--primary); border-radius: 30px;
            box-shadow: 0 0 50px #fff, 0 0 20px rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
        }
        #target-img { display: block; width: 100%; height: auto; object-fit: contain; }

        /* 進度條 */
        #progress {
            position: absolute; bottom: -22px; left: 5px; right: 5px; height: 16px;
            background: var(--gaze); border-radius: 10px; width: 0%; z-index: 20;
        }

        /* 按鈕與面板 */
        #set-btn { position: absolute; top: 20px; left: 20px; width: 60px; height: 60px; background: rgba(255,255,255,0.4); border: 2px solid #fff; border-radius: 15px; font-size: 30px; display: flex; justify-content: center; align-items: center; z-index: 999; cursor: pointer; }
        #panel { position: fixed; inset: 0; background: #1a1a1a; z-index: 1001; padding: 30px; color: #fff; display: none; overflow-y: auto; }
        .item { margin-bottom: 20px; background: #2a2a2a; padding: 15px; border-radius: 15px; }
        .label { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; display: block; color: #ccc; }
        .opts { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        
        /* 選項樣式 */
        .btn { padding: 12px 18px; background: #444; border: 3px solid #555; border-radius: 10px; color: #fff; cursor: pointer; }
        .btn.selected { background: var(--primary); border-color: #fff; }
        .bg-btn { width: 100px; height: 60px; border: 3px solid #555; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        #close-btn { width: 100%; padding: 20px; background: var(--success); color: #fff; border: none; border-radius: 15px; font-size: 1.5rem; font-weight: bold; margin-top: 20px; }
        #next-btn { display: none; position: fixed; bottom: 10%; left: 50%; transform: translateX(-50%); padding: 20px 60px; background: var(--success); color: #fff; border: 3px solid #fff; border-radius: 50px; font-size: 2rem; z-index: 2000; }

        /* 答對動畫 */
        .win { left: 50% !important; top: 50% !important; transform: translate(-50%, -50%) scale(1.5) !important; border-color: var(--success) !important; }
    </style>
</head>
<body>

<div id="scene">
    <div id="bg"></div>
    <div id="obj-wrap">
        <img id="target-img" src="">
        <div id="progress"></div>
    </div>
    <div id="set-btn">⚙️</div>
</div>

<div id="panel">
    <h2 style="text-align:center">遊戲訓練設定</h2>
    
    <div class="item">
        <span class="label">1. 背景選擇</span>
        <div class="opts">
            <div class="bg-btn selected" data-type="img" data-val="mtr">地鐵</div>
            <div class="bg-btn" data-type="img" data-val="street">街道</div>
            <div class="bg-btn" data-type="color" data-val="white" style="background:#fff;color:#000">純白</div>
            <div class="bg-btn" data-type="color" data-val="black" style="background:#000;color:#fff">純黑</div>
        </div>
    </div>

    <div class="item" id="blur-ctrl">
        <span class="label">2. 背景模糊度</span>
        <input type="range" id="blur-range" min="0" max="20" value="0" style="width:100%">
    </div>

    <div class="item">
        <span class="label">3. 訓練類別</span>
        <div class="opts">
            <button class="btn cat-btn selected" data-cat="hk">香港交通</button>
            <button class="btn cat-btn" data-cat="fruit">水果類</button>
        </div>
    </div>

    <div class="item">
        <span class="label">4. 具體目標</span>
        <div class="opts" id="obj-list"></div>
    </div>

    <div class="item">
        <span class="label">5. 目標大小</span>
        <div class="opts">
            <button class="btn size-btn" data-size="400">大</button>
            <button class="btn size-btn selected" data-size="250">中</button>
            <button class="btn size-btn" data-size="130">小</button>
        </div>
    </div>

    <button id="close-btn">確定開始</button>
</div>

<button id="next-btn">下一題 ➔</button>

<script>
    // 預設穩定圖片庫
    const lib = {
        hk: [
            {n:'的士', u:'taxi.jpg'}, {n:'小巴', u:'minibus.jpg'}, {n:'巴士', u:'bus.jpg'}, {n:'電車', u:'tram.jpg'}
        ],
        fruit: [
            {n:'蘋果', u:'apple.jpg'}, {n:'香蕉', u:'banana.jpg'}, {n:'橙', u:'orange.jpg'}, {n:'西瓜', u:'watermelon.jpg'}
        ]
    };
    
    const bgs = {
        mtr: 'https://images.unsplash.com/photo-1444124818704-4d89a495bdec?w=1200',
        street: 'https://images.unsplash.com/photo-1556950961-8c091994fa41?w=1200'
    };

    let conf = { bgT:'img', bgV:'mtr', blur:0, cat:'hk', obj:'taxi.jpg', size:250 };
    let timer, isWin = false;

    // 廣東話語音
    function sayOk() {
        const ut = new SpeechSynthesisUtterance("岩啦");
        ut.lang = 'zh-HK';
        window.speechSynthesis.speak(ut);
    }

    function updateObjList() {
        const container = document.getElementById('obj-list');
        container.innerHTML = '';
        lib[conf.cat].forEach(item => {
            const b = document.createElement('button');
            b.className = 'btn' + (conf.obj === item.u ? ' selected' : '');
            b.textContent = item.n;
            b.onclick = () => {
                conf.obj = item.u;
                document.querySelectorAll('#obj-list .btn').forEach(x => x.classList.remove('selected'));
                b.classList.add('selected');
            };
            container.appendChild(b);
        });
    }

    function draw() {
        isWin = false;
        const bg = document.getElementById('bg');
        const wrap = document.getElementById('obj-wrap');
        const img = document.getElementById('target-img');
        const next = document.getElementById('next-btn');
        
        next.style.display = 'none';
        wrap.classList.remove('win');
        document.getElementById('progress').style.width = '0%';

        // 背景設定
        if(conf.bgT === 'color') {
            bg.style.backgroundImage = 'none';
            bg.style.backgroundColor = conf.bgV;
            document.getElementById('blur-ctrl').style.display = 'none';
        } else {
            bg.style.backgroundImage = `url(${bgs[conf.bgV]})`;
            bg.style.filter = `blur(${conf.blur}px)`;
            document.getElementById('blur-ctrl').style.display = 'block';
        }

        // 目標物設定
        img.src = conf.obj;
        wrap.style.width = conf.size + 'px';
        wrap.style.padding = conf.cat === 'hk' ? '5px' : '20px'; // 的士類減少白邊

        img.onload = () => {
            const maxX = window.innerWidth - conf.size - 60;
            const maxY = window.innerHeight - (conf.size * 1.2) - 60;
            wrap.style.left = (Math.random() * maxX + 30) + 'px';
            wrap.style.top = (Math.random() * maxY + 30) + 'px';
            wrap.style.display = 'flex';
        };
        // 容錯
        img.onerror = () => { wrap.style.display = 'flex'; img.alt = "圖片未找到"; };
    }

    // 觸摸/注視邏輯
    const start = () => {
        if(isWin) return;
        const p = document.getElementById('progress');
        p.style.transition = 'width 1.2s linear';
        p.style.width = '100%';
        timer = setTimeout(() => {
            isWin = true;
            sayOk();
            document.getElementById('obj-wrap').classList.add('win');
            document.getElementById('next-btn').style.display = 'block';
        }, 1200);
    };

    const stop = () => {
        if(isWin) return;
        clearTimeout(timer);
        const p = document.getElementById('progress');
        p.style.transition = 'none';
        p.style.width = '0%';
    };

    // 事件綁定
    document.getElementById('obj-wrap').onpointerenter = start;
    document.getElementById('obj-wrap').onpointerleave = stop;
    document.getElementById('next-btn').onclick = draw;
    document.getElementById('set-btn').onclick = () => document.getElementById('panel').style.display = 'block';
    document.getElementById('close-btn').onclick = () => { document.getElementById('panel').style.display = 'none'; draw(); };

    // 設定切換
    document.querySelectorAll('.bg-btn').forEach(b => {
        b.onclick = () => {
            conf.bgT = b.dataset.type; conf.bgV = b.dataset.val;
            document.querySelectorAll('.bg-btn').forEach(x => x.classList.remove('selected'));
            b.classList.add('selected');
        }
    });

    document.querySelectorAll('.cat-btn').forEach(b => {
        b.onclick = () => {
            conf.cat = b.dataset.cat; conf.obj = lib[conf.cat][0].u;
            document.querySelectorAll('.cat-btn').forEach(x => x.classList.remove('selected'));
            b.classList.add('selected');
            updateObjList();
        }
    });

    document.querySelectorAll('.size-btn').forEach(b => {
        b.onclick = () => {
            conf.size = parseInt(b.dataset.size);
            document.querySelectorAll('.size-btn').forEach(x => x.classList.remove('selected'));
            b.classList.add('selected');
        }
    });

    document.getElementById('blur-range').oninput = (e) => { conf.blur = e.target.value; document.getElementById('bg').style.filter = `blur(${conf.blur}px)`; };

    // 初始化
    updateObjList();
    draw();
</script>

</body>
</html>
