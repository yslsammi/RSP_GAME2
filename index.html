<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>眼神偵測 - 官方原生模式</title>
    <script src="https://webgazer.cs.brown.edu/webgazer.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #ffffff; text-align: center; font-family: sans-serif; }
        #target { position: absolute; width: 150px; height: 150px; background: orange; border-radius: 20px; display: none; z-index: 1; line-height: 150px; color: white; font-weight: bold; }
        .btn-panel { margin-top: 100px; }
        button { padding: 20px; font-size: 1.5rem; cursor: pointer; background: blue; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="btn-panel">
        <h1>最後嘗試：官方原生點模式</h1>
        <button id="init-btn">第一步：強制喚起官方預設點</button>
        <p>點擊後請看：是否有「綠色小點」出現？</p>
        <button id="start-game" style="display:none; background: green;">第二步：開始測試</button>
    </div>

    <div id="target">盯著我！</div>

    <script>
        const target = document.getElementById('target');
        
        document.getElementById('init-btn').onclick = function() {
            this.style.display = 'none';
            document.getElementById('start-game').style.display = 'inline-block';

            webgazer.setGazeListener((data, elapsed) => {
                if (data == null) return;
                
                // 檢查是否注視橘色方塊
                const rect = target.getBoundingClientRect();
                if (data.x >= rect.left && data.x <= rect.right && data.y >= rect.top && data.y <= rect.bottom) {
                    target.style.background = "red";
                    target.innerText = "偵測到了！";
                    setTimeout(() => {
                        target.style.left = Math.random() * (window.innerWidth - 150) + "px";
                        target.style.top = Math.random() * (window.innerHeight - 150) + "px";
                        target.style.background = "orange";
                        target.innerText = "盯著我！";
                    }, 500);
                }
            }).begin();

            // 強制開啟官方所有視覺化工具
            webgazer.showVideoPreview(true)
                    .showPredictionPoints(true) // 官方綠色小點
                    .applyKalmanFilter(true);   // 平滑移動
        };

        document.getElementById('start-game').onclick = function() {
            this.parentElement.style.display = 'none';
            target.style.display = 'block';
            target.style.left = "40%";
            target.style.top = "40%";
        };
    </script>
</body>
</html>
